<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Employee Management System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<script>

if(
    localStorage.getItem("loggedIn") !== "true"
) {

    window.location.href = "login.html";
}

</script>

<div class="container">

    <div class="header">

        <h1>Employee Management</h1>

        <div class="header-buttons">

            <button id="darkModeToggle">
                🌙 Dark Mode
            </button>

            <button id="logoutBtn">
                🚪 Logout
            </button>

        </div>

    </div>

    <div class="dashboard">

    <div class="card">

        <h3>Total Employees</h3>

        <p id="totalEmployees">0</p>

    </div>

    <div class="card">

        <h3>IT Employees</h3>

        <p id="itEmployees">0</p>

    </div>

    <div class="card">

        <h3>HR Employees</h3>

        <p id="hrEmployees">0</p>

    </div>

</div>

    <form id="employeeForm">

        <input
                type="text"
                id="name"
                placeholder="Enter Employee Name"
                required
        >

        <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
        >

        <input
                type="text"
                id="department"
                placeholder="Enter Department"
                required
        >

        <input
                type="text"
                id="salary"
                placeholder="Enter Salary"
                required
        >

        <button type="submit">
            Add Employee
        </button>

    </form>

    <p id="message"></p>

    <h2>Employees List</h2>

    <input
            type="text"
            id="searchInput"
            placeholder="Search Employee"
    >

    <table>

        <thead>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody id="employeeTableBody">

        </tbody>

    </table>

</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
